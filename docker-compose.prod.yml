version: '3.8'

services:
  backend:
    image: ghcr.io/antonyartsev/sync/backend:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - CORS_ORIGINS=http://138.124.18.174:5025,http://localhost:5025
    ports:
      - "5001:80"
    restart: unless-stopped
    networks:
      - sync-network

  frontend:
    image: ghcr.io/antonyartsev/sync/frontend:latest
    environment:
      - BACKEND_URL=http://138.124.18.174:5001
    ports:
      - "5025:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sync-network

networks:
  sync-network:
    driver: bridge