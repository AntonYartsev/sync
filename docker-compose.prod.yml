version: '3.8'

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY}/backend:latest
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:80
      - CORS_ORIGINS=http://138.124.18.174:80
    ports:
      - "5001:80"
    restart: unless-stopped
    networks:
      - sync-network

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY}/frontend:latest
    environment:
      - BACKEND_URL=http://backend:80
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sync-network

networks:
  sync-network:
    driver: bridge 